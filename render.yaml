# Render – celá aplikace (backend + frontend) na jedné URL
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: popelnice
    env: node
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && node dist/index.js
    # Env nastav v Render Dashboard: GMAIL_USER, GMAIL_APP_PASSWORD, APP_TIMEZONE, TEST_RECIPIENT_EMAIL
